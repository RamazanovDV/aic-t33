<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CRM Emulator{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <div class="nav-brand">CRM Emulator</div>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/tickets">Tickets</a>
            <a href="/users">Users</a>
            <span class="status-badge {% if running %}running{% else %}stopped{% endif %}">
                {{ 'Running' if running else 'Stopped' }}
            </span>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
