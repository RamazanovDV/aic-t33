scenarios:
  - id: billing_issue
    category: billing
    priority: high
    templates:
      - "Невозможно оплатить подписку — карта отклоняется"
      - "Двойное списание за последний месяц"
      - "Не могу получить счёт для бухгалтерии"
      - "Проблема с возвратом средств"

  - id: technical_problem
    category: technical
    priority: medium
    templates:
      - "Приложение вылетает при попытке загрузить файл"
      - "Данные не синхронизируются между устройствами"
      - "Ошибка 500 при сохранении документа"
      - "Не работает поиск по документам"

  - id: account_access
    category: account
    priority: high
    templates:
      - "Забыл пароль, не приходит email для сброса"
      - "Аккаунт заблокирован без объяснения причин"
      - "Не могу подтвердить двухфакторную аутентификацию"
      - "Нужно изменить email привязанный к аккаунту"

  - id: feature_request
    category: feature
    priority: low
    templates:
      - "Хочу экспорт данных в Excel"
      - "Нужна интеграция с Slack"
      - "Добавьте тёмную тему интерфейса"
      - "Хотелось бы видеть аналитику по проектам"
